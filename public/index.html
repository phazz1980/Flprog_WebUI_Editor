<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Flprog WebUI Edit App" />
    <meta name="build-date" content="__BUILD_DATE__" />
    <meta name="build-signature" content="__BUILD_SIGNATURE__" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Flprog WebUI Edit</title>
    <script>
      (function() {
        function reloadBypassCache() {
          var search = location.search || '';
          var hash = location.hash || '';
          location.href = location.pathname + search + (search ? '&' : '?') + '_=' + Date.now() + hash;
        }
        var VERSION_POLL_MS = 5 * 60 * 1000;
        function showVersionUpdateBanner(remoteSig) {
          if (document.getElementById('flprog-version-update-banner')) return;
          function mount() {
            if (document.getElementById('flprog-version-update-banner')) return;
            var bar = document.createElement('div');
            bar.id = 'flprog-version-update-banner';
            bar.setAttribute('role', 'status');
            bar.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;padding:12px 16px;font:14px/1.4 system-ui,-apple-system,Segoe UI,sans-serif;background:#111827;color:#f3f4f6;box-shadow:0 -4px 24px rgba(0,0,0,.4);';
            var msg = document.createElement('span');
            msg.textContent = 'На GitHub Pages опубликована новая версия.';
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.textContent = 'Обновить';
            btn.style.cssText = 'cursor:pointer;border:none;border-radius:8px;padding:8px 16px;font:inherit;font-weight:600;background:#38bdf8;color:#0f172a;';
            btn.onclick = function() { reloadBypassCache(); };
            var dismiss = document.createElement('button');
            dismiss.type = 'button';
            dismiss.textContent = 'Позже';
            dismiss.style.cssText = 'cursor:pointer;border:1px solid #6b7280;border-radius:8px;padding:8px 16px;font:inherit;background:transparent;color:#f3f4f6;';
            dismiss.onclick = function() {
              try { sessionStorage.setItem('flprog-version-dismissed-sig', remoteSig); } catch (e) {}
              bar.remove();
            };
            bar.appendChild(msg);
            bar.appendChild(btn);
            bar.appendChild(dismiss);
            (document.body || document.documentElement).appendChild(bar);
          }
          if (document.body) mount();
          else document.addEventListener('DOMContentLoaded', mount);
        }
        if (/\b_=\d+\b/.test(location.search)) {
          var clean = location.search.replace(/\b_=\d+\b&?|&\b_=\d+\b/g, '').replace(/\?&/, '?').replace(/^\?$/, '');
          if (history.replaceState) history.replaceState(null, '', location.pathname + (clean || '') + location.hash);
        }
        var path = location.pathname.replace(/\/[^/]*$/, '') || '/';
        var sigMeta = document.querySelector('meta[name="build-signature"]');
        var currentSig = sigMeta ? (sigMeta.getAttribute('content') || '').trim() : '';
        if (!currentSig || currentSig === '__BUILD_SIGNATURE__') return;
        function checkForNewVersion() {
          if (typeof navigator !== 'undefined' && navigator.onLine === false) return;
          fetch(path + '/build-info.json?t=' + Date.now(), { cache: 'no-store', credentials: 'same-origin' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(d) {
              if (!d || !d.buildDate) return;
              var remoteSig = d.buildSignature || (d.buildDate + '|' + (d.buildTime || ''));
              if (remoteSig === currentSig) return;
              try {
                if (sessionStorage.getItem('flprog-version-dismissed-sig') === remoteSig) return;
              } catch (e) {}
              showVersionUpdateBanner(remoteSig);
            })
            .catch(function() {});
        }
        checkForNewVersion();
        setInterval(checkForNewVersion, VERSION_POLL_MS);
        document.addEventListener('visibilitychange', function() {
          if (!document.hidden) checkForNewVersion();
        });
        if (typeof navigator !== 'undefined' && navigator.serviceWorker && path) {
          navigator.serviceWorker.register(path + '/sw.js', { scope: path + '/' }).catch(function() {});
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="%PUBLIC_URL%/Parser/constants.js"></script>
    <script type="module" src="%PUBLIC_URL%/Parser/parser.js"></script>
    <script type="module" src="%PUBLIC_URL%/Parser/generator.js"></script>
    <script>
      (function() {
        setTimeout(function() {
          var root = document.getElementById('root');
          if (!root || root.children.length > 0) return;
          var mainScript = document.querySelector('script[src*="static/js/main"]');
          if (!mainScript || !mainScript.src) return;
          fetch(mainScript.src, { cache: 'reload', credentials: 'same-origin' })
            .then(function(r) {
              if (r.status === 404) {
                var search = location.search || '';
                var hash = location.hash || '';
                location.href = location.pathname + search + (search ? '&' : '?') + '_=' + Date.now() + hash;
              }
            })
            .catch(function() {});
        }, 4000);
      })();
    </script>
  </body>
</html>
