<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Flprog WebUI Client — просмотр и управление интерфейсом с МК" />
    <meta name="build-date" content="__BUILD_DATE__" />
    <title>Flprog WebUI Client</title>
    <script>
      (function() {
        var base = document.querySelector('base');
        var path = (base && base.getAttribute('href')) || (document.currentScript && document.currentScript.src ? document.currentScript.src.replace(/\/[^/]*$/, '') : '') || '';
        if (!path && typeof window !== 'undefined') path = window.location.pathname.replace(/\/[^/]*$/, '') || '/';
        var meta = document.querySelector('meta[name="build-date"]');
        var current = meta ? (meta.getAttribute('content') || '').trim() : '';
        if (!current || current === '__BUILD_DATE__') return;
        if (typeof navigator !== 'undefined' && navigator.onLine === false) return;
        fetch(path + '/build-info.json?t=' + Date.now(), { cache: 'no-store', credentials: 'same-origin' })
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(d) {
            if (d && d.buildDate && d.buildDate !== current) window.location.reload();
          })
          .catch(function() {});
      })();
    </script>
  </head>
  <body>
    <noscript>Нужен JavaScript для работы приложения.</noscript>
    <div id="root"></div>
  </body>
</html>
